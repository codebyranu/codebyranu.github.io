        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {

        .top-bar {

            border-bottom: 1px solid var(--border);

            display: flex; justify-content: space-between; align-items: center;
        }

        .top-bar-left {

        }

            color: var(--text-muted); text-decoration: none;
            font-size: 0.9rem; font-weight: 500;
            transition: color 0.3s;
        }

        .back-link:hover { color: var(--text); }

        .resume-title {
            font-size: 1.1rem; font-weight: 700;
            background: var(--gradient-1); -webkit-background-clip: text;
            -webkit-text-fill-color: transparent; background-clip: text;
        }

        .btn-download {
            display: inline-flex; align-items: center; gap: 0.5rem;
            padding: 0.6rem 1.4rem; border-radius: 10px;
            font-weight: 600; font-size: 0.85rem; text-decoration: none;
            background: var(--gradient-1); color: white;
            box-shadow: 0 4px 15px rgba(99,102,241,0.4);
            transition: all 0.3s; border: none; cursor: pointer;
        }

        .btn-download:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99,102,241,0.5);
        }

        /* ===== PDF VIEWER ===== */
        .pdf-container {
            flex: 1; display: flex; flex-direction: column;
            padding: 1.5rem 2rem 2rem;
            max-width: 1100px; width: 100%; margin: 0 auto;
        }

        .pdf-frame {
            flex: 1; width: 100%; min-height: 80vh;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: white;
        }

        /* ===== FALLBACK FOR MOBILE ===== */
        .mobile-fallback {
            display: none;
            text-align: center; padding: 3rem 2rem;
        }

        .mobile-fallback p {
            color: var(--text-muted); font-size: 1rem;
            margin-bottom: 1.5rem;
        }

        .btn-open {
            display: inline-flex; align-items: center; gap: 0.5rem;
            padding: 0.8rem 2rem; border-radius: 12px;
            font-weight: 600; font-size: 0.95rem; text-decoration: none;
            border: 1px solid var(--border); color: var(--text);
            transition: all 0.3s; margin-top: 0.5rem;
        }

        .btn-open:hover {
            border-color: var(--primary); background: rgba(99,102,241,0.1);
        }

        @media (max-width: 768px) {
            .pdf-frame { display: none; }
            .mobile-fallback { display: block; }
            .top-bar { padding: 0.8rem 1rem; }
            .pdf-container { padding: 1rem; }
            .resume-title { display: none; }
        }
    </style>
</head>
